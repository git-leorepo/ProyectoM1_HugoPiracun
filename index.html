<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paleta de Colores</title>
    
    <!-- Archivo de estilos CSS-->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/normalizador.css">

    <!-- Conexion con Javascript -->
    <script src="js/script.js" defer></script>

    <!-- conexion con google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&family=Story+Script&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Encabezado -->
    <header id="encabezado" class="clase-encabezado">
        <div id="titulo-contenedor" class="titulo-clase">
            <img src="img/paletta.png" alt="paleta" class="logo-sitio">
            <h1 id="titulo" class="titulo-proyecto">Paleta Colores</h1>                
        </div>
        <!-- titulo del proyecto -->
        
    </header>
    
    <!-- article contenedor de Botones-->
    <div id="main-controles" class="class-controles">
        <article id="articulo-botones" class="clase-articulo-botones">            
                <!-- Botones de funcionalidades -->                                            
                <!-- <button id="botonGenerarCard">Generar Color</button> -->
                <fieldset id="contenedor-radio-colores">
                    
                    <div class="radio-buttons-wrapper">
                        <input type="radio" name="palette-size" value="6" id="size-6" checked>
                        <label for="size-6">6 colores</label>
                        
                        <input type="radio" name="palette-size" value="8" id="size-8">
                        <label for="size-8">8 colores</label>
                        
                        <input type="radio" name="palette-size" value="9" id="size-9">
                        <label for="size-9">9 colores</label>
                        
                    </div>
                </fieldset>
                
                <div id="division-radiobuttom">
                    <p id="tipo-color">Tipo de Color:</p>
                            <label>
                                <input type="radio" name="tipo_color" value="HEX" checked> HEX
                            </label>
                            <label>
                                <input type="radio" name="tipo_color" value="HSL"> HSL
                            </label>
                </div>

                <div id="dividion-Btn-GenerarPaleta">
                    <button id="btn-generar-paleta" class="btn-clase-paleta">Generar Paleta</button>
                </div>


        </article>
        
    </div>

    <!-- Principal -->
    <main id="principal" class="clase-principal">
        <!-- Contenedor de colores -->
        <section id="seccion-colores" class="contenedor">
                <!-- Colores -->
                <!-- <article id="articulo-container" class="class-container">                    
                    <div id="articulo-layer-top" class="layer-top"></div>
                    <p class="texto-color">color</p>
                </article>    -->             
                
        </section>                
    </main>

    <!-- <section id="seccion" class="contenedor-seccion">
        <div id="seccion-div" class="contenedor-btn-paleta">
            
        </div>
    </section> -->
            
    <!-- pie de pagina -->
    <footer id="footer" class="clase-footer">
        <div id="contenedor-footer">
            <p>Proyecto Integrador - M1 - Henry - Elaborado por Hugo Piracun</p>
        </div>
    </footer>

</body>
</html>
