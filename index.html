<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paleta de Colores</title>
    
    <!-- Archivo de estilos CSS-->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/normalizador.css">

    <!-- Conexion con Javascript -->
    <script src="js/script.js" defer></script>
</head>
<body>

    <!-- Encabezado -->
    <header id="encabezado" class="clase-encabezado">
        <div id="titulo-contenedor" class="titulo-clase">
            <h1 id="titulo" class="titulo-proyecto">Paleta de colores</h1>                
        </div>
        <!-- titulo del proyecto -->
        
    </header>
    
    <!-- Principal -->
    <main id="principal" class="clase-principal">
        <!-- Contenedor de colores -->
        <section id="seccion-colores" class="contenedor">
                <!-- Colores -->    
                <div class="colores" name = "c1">item 1</div>
                <div class="colores" name = "c2">item 2</div>
                <div class="colores" name = "c3">item 3</div>
                <div class="colores" name = "c4">item 4</div>
                <div class="colores" name = "c5">item 5</div>                                       
        </section>                
    </main>
    
    <!-- article contenedor de Botones-->
    <article id="articulo-botones" class="clase-articulo-botones">            
            <!-- Botones de funcionalidades -->
            <button id="botonAgregarColor">Agregar color </button>
            <button id="botonGenerarPaleta">Generar Paleta</button>
    </article>
    
    <!-- pie de pagina -->
    <footer>

    </footer>

</body>
</html>
